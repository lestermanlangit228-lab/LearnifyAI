<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const LOGO = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%234F46E5'/%3E%3Cstop offset='100%25' stop-color='%2310B981'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='48' fill='url(%23g)'/%3E%3Ctext x='50' y='67' font-size='52' text-anchor='middle' fill='white'%3E📚%3C/text%3E%3C/svg%3E";

const DECK_COLORS = [

const storage = {
  get: (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } },

};

const AI_KEY = "sg_openai_key";

// ── LUHN ALGORITHM (card number validation) ──
function luhnCheck(num) {
  const digits = num.replace(/\s/g, "");
  if (digits.length < 13) return false;
  let sum = 0, shouldDouble = false;
  for (let i = digits.length - 1; i >= 0; i--) {
    let d = parseInt(digits[i]);
    if (shouldDouble) { d *= 2; if (d > 9) d -= 9; }
    sum += d;
    shouldDouble = !shouldDouble;
  }
  return sum % 10 === 0;
}

// ── EXPIRY DATE VALIDATION ──
function isExpired(mm, yy) {
  const now = new Date();
  const currentYear = now.getFullYear() % 100;
  const currentMonth = now.getMonth() + 1;
  const m = parseInt(mm, 10), y = parseInt(yy, 10);
  if (y < currentYear) return true;
  if (y === currentYear && m < currentMonth) return true;
  return false;
}

// ── PDF TEXT EXTRACTOR ──
async function extractTextFromPDF(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const typedArray = new Uint8Array(e.target.result);
        const pdf = await pdfjsLib.getDocument({ data: typedArray }).promise;
        let fullText = "";
        for (let i = 1; i <= Math.min(pdf.numPages, 20); i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          const pageText = content.items.map(item => item.str).join(" ");
          fullText += pageText + "\n";
        }
        resolve(fullText.trim());
      } catch (err) {
        reject(err);
      }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

async function generateFlashcardsAI(notes, apiKey) {
  if (apiKey) {
    try {
      const res = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
        body: JSON.stringify({ model: "gpt-3.5-turbo", messages: [{ role: "user", content: `Convert these notes into 10 flashcards. Return ONLY a JSON array with "question" and "answer" fields.\n\n${notes.substring(0, 4000)}` }], temperature: 0.7 }),
      });
      const data = await res.json();
      const match = (data.choices?.[0]?.message?.content || "").match(/\[[\s\S]*\]/);
      if (match) return JSON.parse(match[0]);
    } catch(e) {}
  }
  const lines = notes.split(/[.!\n]/).map(s => s.trim()).filter(s => s.length > 20);
  if (lines.length >= 3) return lines.slice(0, 10).map(line => ({ question: `What does the following describe? "${line.substring(0,70)}..."`, answer: line }));
  return [
    { question: "What is the main concept of these notes?", answer: notes.substring(0, 120) },
    { question: "Define the key idea discussed.", answer: "The key idea: " + notes.substring(0, 80) },
    { question: "What is the primary purpose explained?", answer: "To understand and apply the core concepts outlined." },
    { question: "Summarize the core idea.", answer: notes.substring(0, 100) },
    { question: "What are the important details?", answer: "The facts and concepts outlined in the notes." },
    { question: "How would you apply this knowledge?", answer: "By practicing and testing understanding regularly." },
    { question: "What makes this topic significant?", answer: "It forms the foundation for advanced understanding." },
    { question: "What should you remember most?", answer: "Core definitions, key principles, and practical applications." },
  ];
}

async function generateQuizAI(flashcards, apiKey) {
  if (apiKey) {
    try {
      const txt = flashcards.map(c => `Q: ${c.question}\nA: ${c.answer}`).join("\n\n");
      const res = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
        body: JSON.stringify({ model: "gpt-3.5-turbo", messages: [{ role: "user", content: `Convert these flashcards into quiz questions. Return ONLY a JSON array with "question", "options" (4 strings), "correct" (0-3), "type" ("mcq"/"tf").\n\n${txt}` }], temperature: 0.6 }),
      });
      const data = await res.json();
      const match = (data.choices?.[0]?.message?.content || "").match(/\[[\s\S]*\]/);
      if (match) return JSON.parse(match[0]);
    } catch(e) {}
  }
  return flashcards.slice(0, 6).map((card, i) => {
    if (i % 3 === 2) return { question: card.question, type: "tf", options: ["True","False","",""], correct: 0 };
    const opts = [card.answer, "An unrelated concept entirely", "The opposite of what was described", "A different definition altogether"].sort(() => Math.random() - 0.5);
    return { question: card.question, type: "mcq", options: opts, correct: opts.indexOf(card.answer) };
  });
}

      <span style={{ background: "linear-gradient(135deg,#10B981,#059669)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>ify</span>

// ── AUTH ──
function AuthScreen({ onAuth }) {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [name, setName] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    setError(""); setLoading(true);
    await new Promise(r => setTimeout(r, 700));
    const users = storage.get("sg_users", []);
    if (!email || !password) { setError("Please fill all fields"); setLoading(false); return; }
    if (mode === "signup") {
      if (users.find(u => u.email === email)) { setError("Email already registered"); setLoading(false); return; }
      if (password.length < 6) { setError("Password must be 6+ characters"); setLoading(false); return; }
      const u = { id: Date.now(), email, name: name || email.split("@")[0], premium: false };
      storage.set("sg_users", [...users, { ...u, password }]);
      storage.set("sg_current", u);
      onAuth(u);
    } else {
      const found = users.find(u => u.email === email && u.password === password);
      if (!found) { setError("Invalid email or password"); setLoading(false); return; }
      const { password: _, ...safe } = found;
      storage.set("sg_current", safe);
      onAuth(safe);
    }
    setLoading(false);
  };

  return (
    <div className="screen" style={{ background: "linear-gradient(170deg,#4F46E5 0%,#7C3AED 35%,var(--bg) 35%)" }}>
      <div style={{ padding: "44px 24px 24px", textAlign: "center", color: "#fff" }}>
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 12 }}>
          <div style={{ background: "rgba(255,255,255,0.18)", borderRadius: "50%", padding: 14 }}>
            <BrandLogo size={64} />
          </div>
        </div>
        <BrandName fontSize={26} />
        <p style={{ opacity: 0.85, marginTop: 4, fontSize: 14 }}>AI-Powered Study Assistant</p>
      </div>
      <div style={{ flex: 1, padding: "0 20px 40px" }}>
        <div className="card" style={{ padding: 28 }}>
          <div style={{ display: "flex", gap: 0, marginBottom: 24, background: "var(--bg)", borderRadius: 12, padding: 3 }}>
            {["login","signup"].map(m => (
              <button key={m} onClick={() => setMode(m)} style={{ flex: 1, padding: "10px", border: "none", borderRadius: 10, cursor: "pointer", fontWeight: 600, fontSize: 14, transition: "all 0.2s", background: mode === m ? "#fff" : "transparent", color: mode === m ? "var(--primary)" : "var(--text-secondary)", boxShadow: mode === m ? "0 2px 8px rgba(46,93,168,0.15)" : "none" }}>
                {m === "login" ? "Sign In" : "Sign Up"}
              </button>
            ))}
          </div>
          {mode === "signup" && <div className="input-group"><label className="input-label">Full Name</label><input className="input" placeholder="Alex Johnson" value={name} onChange={e => setName(e.target.value)} /></div>}
          <div className="input-group"><label className="input-label">Email Address</label><input className="input" type="email" placeholder="you@example.com" value={email} onChange={e => setEmail(e.target.value)} /></div>
          <div className="input-group"><label className="input-label">Password</label><input className="input" type="password" placeholder="••••••••" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSubmit()} /></div>
          {error && <div style={{ color: "var(--danger)", fontSize: 13, marginBottom: 12, padding: "10px 14px", background: "#fee2e2", borderRadius: 8 }}>⚠️ {error}</div>}
          <button className="btn btn-primary btn-full" onClick={handleSubmit} disabled={loading} style={{ marginTop: 8 }}>
            {loading ? "⏳ Loading..." : mode === "login" ? "🔑 Sign In" : "🚀 Create Account"}

}

// ── GENERATOR (with PDF upload) ──
function GeneratorScreen({ user, onNavigate, onSave, showToast }) {
  const [notes, setNotes] = useState("");
  const [loading, setLoading] = useState(false);
  const [pdfLoading, setPdfLoading] = useState(false);
  const [cards, setCards] = useState([]);
  const [step, setStep] = useState("input");
  const [deckName, setDeckName] = useState("");
  const [showSave, setShowSave] = useState(false);
  const [flipped, setFlipped] = useState({});
  const [pdfFile, setPdfFile] = useState(null);
  const [inputMode, setInputMode] = useState("pdf"); // "pdf" or "text"
  const [dragOver, setDragOver] = useState(false);
  const fileInputRef = useRef(null);
  const apiKey = storage.get(AI_KEY, "");
  const today = new Date().toDateString();
  const cardsToday = storage.get(`sg_cards_${today}`, 0);
  const LIMIT = 10;

  const handlePDFUpload = async (file) => {
    if (!file || file.type !== "application/pdf") { showToast("⚠️ Please upload a PDF file"); return; }
    setPdfFile(file);
    setPdfLoading(true);
    try {
      const text = await extractTextFromPDF(file);
      if (!text || text.length < 50) { showToast("⚠️ Couldn't extract text from this PDF"); setPdfLoading(false); return; }
      setNotes(text);
      showToast("✅ PDF extracted! Generating flashcards...");
      setPdfLoading(false);
      // Auto-generate
      if (!user.premium && cardsToday >= LIMIT) { onNavigate("premium"); return; }
      setLoading(true);
      const result = await generateFlashcardsAI(text, apiKey);
      const limited = user.premium ? result : result.slice(0, Math.min(result.length, LIMIT - cardsToday));
      storage.set(`sg_cards_${today}`, cardsToday + limited.length);
      setCards(limited.map((c, i) => ({ ...c, id: Date.now() + i })));
      setStep("result");
      setLoading(false);
    } catch (err) {
      showToast("⚠️ Failed to read PDF. Try a different file.");
      setPdfLoading(false);
    }
  };

  const generate = async () => {
    if (!notes.trim()) return;
    if (!user.premium && cardsToday >= LIMIT) { onNavigate("premium"); return; }
    setLoading(true);
    const result = await generateFlashcardsAI(notes, apiKey);
    const limited = user.premium ? result : result.slice(0, Math.min(result.length, LIMIT - cardsToday));
    storage.set(`sg_cards_${today}`, cardsToday + limited.length);
    setCards(limited.map((c, i) => ({ ...c, id: Date.now() + i })));
    setStep("result");
    setLoading(false);
  };

  const saveCards = () => {
    if (!deckName.trim()) return;
    const decks = storage.get("sg_decks", []);
    const deck = { id: Date.now(), name: deckName, cards, created: Date.now(), lastStudied: null, color: DECK_COLORS[decks.length % DECK_COLORS.length] };
    storage.set("sg_decks", [...decks, deck]);
    onSave(); setShowSave(false);
    showToast("✅ Deck saved!");
    setTimeout(() => onNavigate("decks"), 700);
  };

  if (loading || pdfLoading) return (
    <div className="screen" style={{ alignItems: "center", justifyContent: "center", gap: 20, padding: 40 }}>
      <div style={{ width: 64, height: 64, border: "5px solid var(--border)", borderTopColor: "var(--primary)", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
      <div style={{ textAlign: "center" }}>
        <div style={{ fontWeight: 700, fontSize: 18, marginBottom: 6 }}>
          {pdfLoading ? "📄 Reading PDF..." : "✨ Generating Flashcards..."}
        </div>
        <div style={{ color: "var(--text-secondary)", fontSize: 14 }}>
          {pdfLoading ? "Extracting text from your document" : "AI is creating your study cards"}
        </div>
      </div>
    </div>
  );

  if (step === "result") return (
    <div className="screen">
      <div className="topbar">
        <button className="back-btn" onClick={() => setStep("input")}>←</button>
        <span className="topbar-title">✨ {cards.length} Flashcards</span>
        <button className="btn btn-primary btn-sm" onClick={() => setShowSave(true)}>💾 Save</button>
      </div>
      <div style={{ padding: "16px 20px 90px", overflowY: "auto" }}>
        <div className="swipe-hint">👆 Tap any card to flip and see the answer</div>
        {cards.map((card, i) => (
          <div key={card.id} style={{ marginBottom: 16 }}>
            <div className="flashcard-container" onClick={() => setFlipped(f => ({ ...f, [card.id]: !f[card.id] }))}>
              <div className={`flashcard-inner ${flipped[card.id] ? "flipped" : ""}`}>
                <div className="flashcard-face flashcard-front">
                  <div className="flashcard-label">Question {i+1}</div>
                  <div className="flashcard-text">{card.question}</div>
                  <div style={{ marginTop: 12, fontSize: 12, opacity: 0.75 }}>Tap to reveal answer</div>
                </div>
                <div className="flashcard-face flashcard-back">
                  <div className="flashcard-label">Answer</div>
                  <div className="flashcard-text">{card.answer}</div>
                </div>
              </div>
            </div>
          </div>
        ))}
        <button className="btn btn-accent btn-full" onClick={() => onNavigate("quiz", { cards })} style={{ marginTop: 4 }}>🎯 Turn into Quiz</button>
      </div>
      {showSave && (
        <div className="modal-overlay" onClick={() => setShowSave(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-handle" />
            <h3 style={{ fontSize: 18, fontWeight: 700, marginBottom: 16 }}>💾 Save to Deck</h3>
            <div className="input-group"><label className="input-label">Deck Name</label><input className="input" placeholder="e.g. Biology Chapter 3" value={deckName} onChange={e => setDeckName(e.target.value)} autoFocus /></div>
            <div style={{ display: "flex", gap: 10 }}>
              <button className="btn btn-ghost" style={{ flex: 1 }} onClick={() => setShowSave(false)}>Cancel</button>
              <button className="btn btn-primary" style={{ flex: 2 }} onClick={saveCards} disabled={!deckName.trim()}>Save Deck</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );

  return (
    <div className="screen">
      <div className="topbar">
        <button className="back-btn" onClick={() => onNavigate("home")}>←</button>
        <span className="topbar-title">✨ Generate Flashcards</span>
        {!user.premium && <span className="badge badge-free">{Math.max(0, LIMIT - cardsToday)} left</span>}
      </div>
      <div style={{ padding: "16px 20px 90px", overflowY: "auto" }}>
        {/* Mode toggle */}
        <div style={{ display: "flex", gap: 0, marginBottom: 20, background: "var(--surface)", borderRadius: 14, padding: 4, boxShadow: "var(--shadow)" }}>
          {[["pdf","📄 Upload PDF"],["text","✏️ Paste Notes"]].map(([mode, label]) => (
            <button key={mode} onClick={() => setInputMode(mode)} style={{ flex: 1, padding: "10px 8px", border: "none", borderRadius: 11, cursor: "pointer", fontWeight: 600, fontSize: 13, transition: "all 0.2s", background: inputMode === mode ? "linear-gradient(135deg,var(--primary),var(--primary-dark))" : "transparent", color: inputMode === mode ? "#fff" : "var(--text-secondary)" }}>
              {label}
            </button>
          ))}
        </div>

        {inputMode === "pdf" ? (
          <div>
            <input ref={fileInputRef} type="file" accept=".pdf" style={{ display: "none" }} onChange={e => e.target.files[0] && handlePDFUpload(e.target.files[0])} />
            <div
              className={`pdf-dropzone ${dragOver ? "drag" : ""}`}
              onClick={() => fileInputRef.current?.click()}
              onDragOver={e => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={e => { e.preventDefault(); setDragOver(false); const f = e.dataTransfer.files[0]; if (f) handlePDFUpload(f); }}
            >
              <div style={{ fontSize: 56, marginBottom: 12 }}>📄</div>
              <div style={{ fontWeight: 700, fontSize: 16, color: "var(--primary)", marginBottom: 6 }}>
                {pdfFile ? `✅ ${pdfFile.name}` : "Drop your PDF here"}
              </div>
              <div style={{ fontSize: 13, color: "var(--text-secondary)", marginBottom: 16 }}>
                {pdfFile ? "Click to upload a different file" : "or click to browse your files"}
              </div>
              <button className="btn btn-primary" style={{ padding: "10px 24px", fontSize: 14 }} onClick={e => { e.stopPropagation(); fileInputRef.current?.click(); }}>
                📂 Browse PDF
              </button>
            </div>
            <div className="card" style={{ background: "var(--primary-light)", border: "1.5px solid #bfdbfe", marginTop: 16 }}>
              <p style={{ fontSize: 13, color: "var(--primary-dark)", lineHeight: 1.6 }}>📚 <strong>How it works:</strong> Upload any PDF (lecture slides, textbook, notes) and AI automatically extracts key concepts and creates flashcards — no copy-pasting needed!</p>
            </div>
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <div className="card" style={{ background: "var(--primary-light)", border: "1.5px solid #bfdbfe" }}>
              <p style={{ fontSize: 13, color: "var(--primary-dark)", lineHeight: 1.6 }}>📝 <strong>Paste your notes</strong> — lecture notes, textbooks, or any material. AI extracts Q&A flashcards instantly.</p>
            </div>
            <div className="input-group">
              <label className="input-label">Your Notes</label>
              <textarea className="input" placeholder="Paste or type your study notes here..." style={{ minHeight: 220 }} value={notes} onChange={e => setNotes(e.target.value)} />
            </div>
            <button className="btn btn-primary btn-full" onClick={generate} disabled={!notes.trim()} style={{ fontSize: 16 }}>
              ✨ Generate Flashcards
            </button>
          </div>
        )}

        <div className="card" style={{ padding: "14px 18px", marginTop: 16 }}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 6 }}>🔑 OpenAI API Key (optional)</div>
          <input className="input" type="password" placeholder="sk-... for real AI generation" style={{ marginBottom: 4 }} defaultValue={apiKey} onChange={e => storage.set(AI_KEY, e.target.value)} />
          <div style={{ fontSize: 11, color: "var(--text-secondary)" }}>Leave blank to use smart auto-generation</div>
        </div>
      </div>
    </div>
  );
}

              </div>
            </div>
            <div style={{ display: "flex", gap: 6 }}>

              <button onClick={() => setDeleteId(deck.id)} style={{ background: "#fee2e2", border: "none", borderRadius: 8, padding: "6px 10px", cursor: "pointer", color: "var(--danger)", fontSize: 16 }}>🗑</button>

            <div className="input-group"><label className="input-label">Deck Name</label><input className="input" placeholder="e.g. Physics Chapter 5" value={newName} onChange={e => setNewName(e.target.value)} onKeyDown={e => e.key === "Enter" && createDeck()} autoFocus /></div>
            <div style={{ display: "flex", gap: 10 }}>
              <button className="btn btn-ghost" style={{ flex: 1 }} onClick={() => setShowCreate(false)}>Cancel</button>
              <button className="btn btn-primary" style={{ flex: 2 }} onClick={createDeck} disabled={!newName.trim()}>Create</button>
            </div>
          </div>
        </div>
      )}
      {deleteId && (
        <div className="modal-overlay" onClick={() => setDeleteId(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-handle" />
            <h3 style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>🗑️ Delete Deck?</h3>
            <p style={{ color: "var(--text-secondary)", fontSize: 14, marginBottom: 20 }}>This cannot be undone.</p>
            <div style={{ display: "flex", gap: 10 }}>
              <button className="btn btn-ghost" style={{ flex: 1 }} onClick={() => setDeleteId(null)}>Cancel</button>
              <button className="btn btn-danger" style={{ flex: 1 }} onClick={() => deleteDeck(deleteId)}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── STUDY ──
function StudyScreen({ user, onNavigate, params }) {
  const [decks] = useState(storage.get("sg_decks", []));
  const [selectedDeck, setSelectedDeck] = useState(params?.deck || null);
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [results, setResults] = useState({});
  const [done, setDone] = useState(false);
  const cards = selectedDeck?.cards || [];

  const mark = (diff) => {
    setResults(r => ({ ...r, [idx]: diff }));
    setFlipped(false);
    if (idx < cards.length - 1) setTimeout(() => setIdx(i => i + 1), 250);
    else {
      setDone(true);
      const today = new Date().toDateString();
      if (storage.get("sg_last_study", null) !== today) {
        storage.set("sg_streak", (storage.get("sg_streak", 0)) + 1);
        storage.set("sg_last_study", today);
      }
    }
  };

  if (!selectedDeck) return (
    <div className="screen">
      <div className="topbar"><button className="back-btn" onClick={() => onNavigate("home")}>←</button><span className="topbar-title">📖 Study Mode</span></div>
      <div style={{ padding: "16px 20px 90px" }}>
        {decks.length === 0 ? <div className="empty-state"><div style={{ fontSize: 56 }}>📭</div><h3 style={{ fontWeight: 700 }}>No decks yet</h3><button className="btn btn-primary" onClick={() => onNavigate("generate")}>📄 Upload PDF</button></div>
          : decks.map(deck => (
            <div key={deck.id} className="deck-card" onClick={() => setSelectedDeck(deck)}>
              <div className="deck-icon" style={{ background: deck.color?.bg || DECK_COLORS[0].bg }}><span>{deck.color?.icon || "📚"}</span></div>
              <div style={{ flex: 1 }}><div style={{ fontWeight: 700 }}>{deck.name}</div><div style={{ fontSize: 12, color: "var(--text-secondary)" }}>{deck.cards?.length || 0} cards</div></div>
              <span>›</span>
            </div>
          ))
        }
      </div>
    </div>
  );

  if (done) {
    const easy = Object.values(results).filter(r => r === "easy").length;
    const hard = Object.values(results).filter(r => r === "hard").length;
    return (
      <div className="screen" style={{ alignItems: "center", justifyContent: "center", padding: "40px 24px", textAlign: "center", gap: 20 }}>
        <div style={{ fontSize: 72 }}>🎉</div>
        <h2 style={{ fontSize: 26, fontWeight: 800 }}>Session Complete!</h2>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, width: "100%" }}>
          <div className="stat-box" style={{ background: "#d1fae5" }}><div className="stat-number" style={{ color: "var(--success)" }}>{easy}</div><div className="stat-label">Easy ✅</div></div>
          <div className="stat-box" style={{ background: "#fee2e2" }}><div className="stat-number" style={{ color: "var(--danger)" }}>{hard}</div><div className="stat-label">Hard 💪</div></div>
        </div>
        <div style={{ display: "flex", gap: 12, width: "100%" }}>
          <button className="btn btn-ghost" style={{ flex: 1 }} onClick={() => { setIdx(0); setFlipped(false); setResults({}); setDone(false); }}>🔄 Restart</button>
          <button className="btn btn-primary" style={{ flex: 1 }} onClick={() => onNavigate("home")}>🏠 Home</button>
        </div>
      </div>
    );
  }

  if (!cards.length) return <div className="screen" style={{ alignItems: "center", justifyContent: "center", gap: 16, padding: 24, textAlign: "center" }}><div style={{ fontSize: 56 }}>📭</div><h3>No cards in this deck</h3><button className="btn btn-primary" onClick={() => onNavigate("generate")}>Add Cards</button></div>;

  const card = cards[idx];
  return (
    <div className="screen">
      <div className="topbar">
        <button className="back-btn" onClick={() => setSelectedDeck(null)}>←</button>
        <span className="topbar-title">📖 {selectedDeck.name}</span>

// ── QUIZ ──
function QuizScreen({ user, onNavigate, params }) {
  const [decks] = useState(storage.get("sg_decks", []));
  const [questions, setQuestions] = useState([]);
  const [loading, setLoading] = useState(false);
  const [started, setStarted] = useState(false);
  const [qIdx, setQIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const apiKey = storage.get(AI_KEY, "");
  const today = new Date().toDateString();
  const quizzesToday = storage.get(`sg_quizzes_${today}`, 0);

  useEffect(() => { if (params?.cards?.length) startFromCards(params.cards); }, []);

  const startFromCards = async (cards) => {
    if (!user.premium && quizzesToday >= 1) { onNavigate("premium"); return; }
    setLoading(true);
    const qs = await generateQuizAI(cards, apiKey);
    storage.set(`sg_quizzes_${today}`, quizzesToday + 1);
    const s = storage.get("sg_quiz_stats", { total: 0, scores: [] });
    storage.set("sg_quiz_stats", { ...s, total: s.total + 1 });
    setQuestions(qs); setStarted(true); setLoading(false);
  };

  const answer = (i) => { if (answered) return; setSelected(i); setAnswered(true); if (i === questions[qIdx].correct) setScore(s => s + 1); };
  const next = () => { if (qIdx < questions.length - 1) { setQIdx(q => q+1); setSelected(null); setAnswered(false); } else { setDone(true); const p = Math.round(score/questions.length*100); const s = storage.get("sg_quiz_stats", {total:0,scores:[]}); storage.set("sg_quiz_stats", {...s, scores:[...(s.scores||[]),p]}); } };
  const reset = () => { setQIdx(0); setSelected(null); setAnswered(false); setScore(0); setDone(false); };

  if (done) {
    const pct = Math.round(score/questions.length*100);
    return (
      <div className="screen" style={{ padding: "40px 24px", alignItems: "center", justifyContent: "center", textAlign: "center", gap: 20 }}>
        <h2 style={{ fontSize: 26, fontWeight: 800 }}>Quiz Complete! {pct>=80?"🏆":pct>=60?"👍":"💪"}</h2>
        <div style={{ position: "relative", width: 140, height: 140, margin: "0 auto" }}>
          <svg width="140" height="140" style={{ position: "absolute", top: 0, left: 0, transform: "rotate(-90deg)" }}>
            <circle cx="70" cy="70" r="60" fill="none" stroke="var(--border)" strokeWidth="12" />
            <circle cx="70" cy="70" r="60" fill="none" stroke={pct>=80?"#10B981":pct>=60?"#2E5DA8":"#F59E0B"} strokeWidth="12" strokeDasharray={`${pct*3.77} 377`} strokeLinecap="round" />
          </svg>
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
            <div style={{ fontSize: 32, fontWeight: 800, color: pct>=80?"var(--success)":"var(--primary)" }}>{pct}%</div>
            <div style={{ fontSize: 12, color: "var(--text-secondary)" }}>Score</div>
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, width: "100%" }}>
          <div className="stat-box" style={{ background: "#d1fae5" }}><div className="stat-number" style={{ color: "var(--success)" }}>{score}</div><div className="stat-label">Correct ✅</div></div>
          <div className="stat-box" style={{ background: "#fee2e2" }}><div className="stat-number" style={{ color: "var(--danger)" }}>{questions.length-score}</div><div className="stat-label">Wrong ❌</div></div>
        </div>
        <div style={{ display: "flex", gap: 12, width: "100%" }}>
          <button className="btn btn-ghost" style={{ flex: 1 }} onClick={reset}>🔄 Retry</button>
          <button className="btn btn-primary" style={{ flex: 1 }} onClick={() => onNavigate("home")}>🏠 Home</button>
        </div>
      </div>
    );
  }

  if (loading) return <div className="screen" style={{ alignItems: "center", justifyContent: "center", gap: 16 }}><div style={{ width: 50, height: 50, border: "4px solid var(--border)", borderTopColor: "var(--primary)", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} /><p style={{ color: "var(--text-secondary)" }}>Generating quiz...</p></div>;

  if (!started) return (
    <div className="screen">
      <div className="topbar"><button className="back-btn" onClick={() => onNavigate("home")}>←</button><span className="topbar-title">🧪 Take a Quiz</span>{!user.premium && <span className="badge badge-free">{Math.max(0,1-quizzesToday)} left</span>}</div>
      <div style={{ padding: "16px 20px 90px" }}>
        {decks.filter(d => d.cards?.length > 0).length === 0
          ? <div className="empty-state"><div style={{ fontSize: 56 }}>🧪</div><h3 style={{ fontWeight: 700 }}>No decks available</h3><button className="btn btn-primary" onClick={() => onNavigate("generate")}>📄 Upload PDF</button></div>
          : decks.filter(d => d.cards?.length > 0).map(deck => (
            <div key={deck.id} className="deck-card" onClick={() => startFromCards(deck.cards)}>
              <div className="deck-icon" style={{ background: deck.color?.bg || DECK_COLORS[0].bg }}><span>{deck.color?.icon || "📚"}</span></div>
              <div style={{ flex: 1 }}><div style={{ fontWeight: 700 }}>{deck.name}</div><div style={{ fontSize: 12, color: "var(--text-secondary)" }}>{deck.cards?.length} cards → ~{Math.min(6,deck.cards.length)} questions</div></div>
              <button className="btn btn-primary btn-sm">Start →</button>
            </div>
          ))
        }
      </div>
    </div>
  );

  const q = questions[qIdx];
  const opts = q.type === "tf" ? ["True","False"] : q.options;
  return (
    <div className="screen">
      <div className="topbar"><button className="back-btn" onClick={() => { setStarted(false); reset(); }}>←</button><span className="topbar-title">🧪 Quiz</span><span style={{ fontSize: 13, color: "var(--text-secondary)", fontWeight: 600 }}>{qIdx+1}/{questions.length}</span></div>
      <div style={{ padding: "16px 20px", flex: 1, display: "flex", flexDirection: "column", gap: 16 }}>
        <div><div className="progress-bar"><div className="progress-fill" style={{ width: `${(qIdx/questions.length)*100}%` }} /></div><div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, fontSize: 12, color: "var(--text-secondary)" }}><span>Question {qIdx+1} of {questions.length}</span><span style={{ color: "var(--success)", fontWeight: 600 }}>✅ {score} correct</span></div></div>
        <div className="card" style={{ background: "var(--primary-light)", border: "1.5px solid #bfdbfe" }}>
          <div style={{ display: "flex", gap: 8, alignItems: "flex-start" }}>
            <span className="tag">{q.type === "tf" ? "T/F" : "MCQ"}</span>
            <p style={{ fontWeight: 600, fontSize: 16, color: "var(--text)", lineHeight: 1.5 }}>{q.question}</p>
          </div>
        </div>
        <div>
          {opts.map((opt, i) => {
            if (!opt) return null;
            let cls = "quiz-option";
            if (answered) { if (i === q.correct) cls += " correct"; else if (i === selected) cls += " wrong"; cls += " disabled"; }
            return (
              <div key={i} className={cls} onClick={() => answer(i)}>
                <span style={{ width: 28, height: 28, background: answered ? (i === q.correct ? "#10B981" : i === selected ? "#EF4444" : "var(--border)") : "var(--bg)", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 13, flexShrink: 0 }}>
                  {answered ? (i === q.correct ? "✓" : i === selected ? "✗" : String.fromCharCode(65+i)) : String.fromCharCode(65+i)}
                </span>
                {opt}
              </div>
            );
          })}
        </div>
        {answered && (
          <div style={{ animation: "slideUp 0.3s ease" }}>
            <div className="card" style={{ background: selected===q.correct?"#d1fae5":"#fee2e2", border: `1.5px solid ${selected===q.correct?"#6ee7b7":"#fca5a5"}`, marginBottom: 12 }}>
              <div style={{ fontWeight: 700, color: selected===q.correct?"#065f46":"#991b1b", marginBottom: 4 }}>{selected===q.correct?"✅ Correct!":"❌ Incorrect"}</div>
              {selected !== q.correct && <div style={{ fontSize: 13 }}>Answer: <strong>{opts[q.correct]}</strong></div>}
            </div>
            <button className="btn btn-primary btn-full" onClick={next}>{qIdx < questions.length-1 ? "Next →" : "🏁 See Results"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── PAYMENT FORM (FULLY FIXED) ──
function PaymentForm({ plan, onSuccess, onCancel }) {
  const [cardNumber, setCardNumber] = useState("");
  const [expiry, setExpiry] = useState("");
  const [cvv, setCvv] = useState("");
  const [name, setName] = useState("");
  const [processing, setProcessing] = useState(false);
  const [success, setSuccess] = useState(false);
  const [error, setError] = useState("");

  const formatCard = (val) => {
    const digits = val.replace(/\D/g, "").substring(0, 16);
    return digits.replace(/(.{4})/g, "$1 ").trim();
  };
  const formatExpiry = (val) => {
    const digits = val.replace(/\D/g, "").substring(0, 4);
    if (digits.length >= 3) return digits.substring(0,2) + "/" + digits.substring(2);
    return digits;
  };
  const getCardBrand = (num) => {
    const n = num.replace(/\s/g, "");
    if (/^4/.test(n)) return { name: "Visa" };
    if (/^5[1-5]/.test(n)) return { name: "MC" };
    if (/^3[47]/.test(n)) return { name: "Amex" };
    if (/^6(?:011|5)/.test(n)) return { name: "Discover" };
    return null;
  };

  const validate = () => {
    if (!name.trim()) { setError("Please enter the cardholder name"); return false; }
    const rawCard = cardNumber.replace(/\s/g, "");
    if (rawCard.length < 15) { setError("Please enter a valid card number"); return false; }
    if (!luhnCheck(rawCard)) { setError("Card number is invalid. Please check and try again"); return false; }
    if (expiry.length < 5) { setError("Please enter a valid expiry date (MM/YY)"); return false; }
    const [mm, yy] = expiry.split("/");
    const m = parseInt(mm, 10);
    if (m < 1 || m > 12) { setError("Invalid expiry month (01–12)"); return false; }
    if (isExpired(mm, yy)) { setError("This card has expired. Please use a valid card"); return false; }
    const brand = getCardBrand(cardNumber);
    const isAmex = brand?.name === "Amex";
    if (cvv.length < (isAmex ? 4 : 3)) { setError(`Please enter a valid ${isAmex ? "4-digit" : "3-digit"} CVV`); return false; }
    return true;
  };

  const handlePayment = async () => {
    setError("");
    if (!validate()) return;
    setProcessing(true);
    await new Promise(r => setTimeout(r, 2200));
    setProcessing(false);
    setSuccess(true);
    setTimeout(() => onSuccess(), 1500);
  };

  const brand = getCardBrand(cardNumber);
  const price = plan === "yearly" ? "$29.99/year" : "$3.99/month";

  if (success) return (
    <div style={{ padding: "36px 20px", textAlign: "center" }}>
      <div style={{ width: 72, height: 72, background: "var(--gradient-green)", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 36, margin: "0 auto 20px", boxShadow: "0 8px 24px rgba(16,185,129,0.35)", animation: "countUp 0.5s ease" }}>✓</div>
      <div style={{ fontWeight: 900, fontSize: 22, marginBottom: 8, letterSpacing: -0.3 }}>Payment Successful! 🎉</div>
      <div style={{ color: "var(--text-secondary)", fontSize: 14, fontWeight: 500 }}>Welcome to Premium! Unlocking your account...</div>
    </div>
  );

  if (processing) return (
    <div style={{ padding: "36px 20px", textAlign: "center" }}>
      <div style={{ width: 64, height: 64, border: "6px solid var(--border)", borderTopColor: "var(--primary)", borderRadius: "50%", animation: "spin 0.75s linear infinite", margin: "0 auto 20px" }} />
      <div style={{ fontWeight: 800, fontSize: 18, marginBottom: 8 }}>Processing Payment...</div>
      <div style={{ color: "var(--text-secondary)", fontSize: 14, fontWeight: 500 }}>🔒 Secured with 256-bit TLS encryption</div>
    </div>
  );

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 22 }}>
        <h3 style={{ fontSize: 20, fontWeight: 900, letterSpacing: -0.3 }}>💳 Payment Details</h3>
        <span className="secure-badge">🔒 SSL Secured</span>
      </div>
      <div style={{ background: "var(--gradient-card)", borderRadius: 16, padding: "18px 20px", color: "#fff", marginBottom: 22, display: "flex", justifyContent: "space-between", alignItems: "center", boxShadow: "0 8px 24px rgba(79,70,229,0.25)" }}>
        <div>
          <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 3 }}>👑 Learnify AI Premium</div>
          <div style={{ opacity: 0.85, fontSize: 12, fontWeight: 500 }}>{plan === "yearly" ? "Annual Plan · Save 37%" : "Monthly Plan"} · Cancel anytime</div>
        </div>
        <div style={{ fontWeight: 900, fontSize: 22, letterSpacing: -0.5 }}>
          {plan === "yearly" ? "$29.99" : "$3.99"}
          <span style={{ fontSize: 12, fontWeight: 500, opacity: 0.85 }}>{plan === "yearly" ? "/yr" : "/mo"}</span>
        </div>
      </div>
      <div className="input-group">
        <label className="input-label">Cardholder Name</label>
        <input className="card-field" placeholder="Jane Smith" value={name} onChange={e => setName(e.target.value)} />
      </div>
      <div className="input-group">
        <label className="input-label">Card Number</label>

          <input className="card-field" placeholder="1234 5678 9012 3456" value={cardNumber} onChange={e => setCardNumber(formatCard(e.target.value))} maxLength={19} style={{ paddingRight: brand ? 64 : 16 }} />

// ── MAIN APP ──
function App() {
  const [onboarded] = useState(storage.get("sg_onboarded", false));
  const [showOnboard, setShowOnboard] = useState(!onboarded);
  const [user, setUser] = useState(storage.get("sg_current", null));
  const [screen, setScreen] = useState("home");
  const [params, setParams] = useState({});
  const [deckRefresh, setDeckRefresh] = useState(0);
  const [toast, setToast] = useState(null);
  const [activeTab, setActiveTab] = useState("home");

  const showToast = useCallback((msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); }, []);
  const navigate = (s, p = {}) => { setScreen(s); setParams(p); if (["home","generate","decks","study","quiz"].includes(s)) setActiveTab(s); };
  const handleAuth = (u) => { setUser(u); setScreen("home"); };
  const handleLogout = () => { storage.set("sg_current", null); setUser(null); setScreen("home"); };
  const handleUpgrade = () => {
    const u = {...user, premium: true};
    setUser(u);
    storage.set("sg_current", u);
    const users = storage.get("sg_users",[]);
    storage.set("sg_users", users.map(x => x.email===user.email?{...x,premium:true}:x));
    showToast("👑 Welcome to Premium!");
    navigate("home");
  };

  const decks = storage.get("sg_decks", []);
  const stats = { totalCards: decks.reduce((a,d)=>a+(d.cards?.length||0),0), totalQuizzes: storage.get("sg_quiz_stats",{total:0}).total, streak: storage.get("sg_streak",0), recentDecks: [...decks].sort((a,b)=>(b.lastStudied||0)-(a.lastStudied||0)) };

  if (showOnboard && !onboarded) return <OnboardingScreen onDone={() => { storage.set("sg_onboarded", true); setShowOnboard(false); }} />;
  if (!user) return <AuthScreen onAuth={handleAuth} />;

  const tabs = [
    { id: "home", icon: "🏠", label: "Home" },
    { id: "generate", icon: "📄", label: "Upload" },
    { id: "decks", icon: "📚", label: "Decks" },
    { id: "study", icon: "📖", label: "Study" },
    { id: "quiz", icon: "🧪", label: "Quiz" },
  ];

  const renderScreen = () => {
    switch(screen) {
      case "home": return <HomeScreen user={user} onNavigate={navigate} stats={stats} />;
      case "generate": return <GeneratorScreen user={user} onNavigate={navigate} onSave={() => setDeckRefresh(r=>r+1)} showToast={showToast} />;
      case "decks": return <DecksScreen user={user} onNavigate={navigate} refreshKey={deckRefresh} />;
      case "study": return <StudyScreen user={user} onNavigate={navigate} params={params} />;
      case "quiz": return <QuizScreen user={user} onNavigate={navigate} params={params} />;
      case "premium": return <PremiumScreen user={user} onNavigate={navigate} onUpgrade={handleUpgrade} />;
      case "profile": return <ProfileScreen user={user} onNavigate={navigate} onLogout={handleLogout} />;
      default: return <HomeScreen user={user} onNavigate={navigate} stats={stats} />;
    }
  };

  return (
    <div className="app-shell">
      <DesktopSidebar user={user} activeTab={activeTab} onNavigate={navigate} onLogout={handleLogout} />
      <div className="desktop-main">
        {renderScreen()}
        {!["premium","profile"].includes(screen) && (
          <nav className="bottom-nav">
            {tabs.map(tab => (
              <button key={tab.id} className={`nav-item ${activeTab===tab.id?"active":""}`} onClick={() => navigate(tab.id)}>
                <span className="nav-icon">{tab.icon}</span>
                <span style={{ color: activeTab===tab.id?"var(--primary)":"var(--text-secondary)" }}>{tab.label}</span>
              </button>
            ))}
          </nav>
        )}
        {toast && <Toast message={toast} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
